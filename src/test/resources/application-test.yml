spring:
  datasource:
    url: jdbc:h2:mem:quotaguard;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

security:
  jwt:
    secret: test-secret-test-secret-test-secret-test
    expiration: PT1H

quotaguard:
  default-daily-limit: 100
  penalty-decay-per-reset: 1
  reset-cron: "0 0 0 * * *"
  penalties:
    short-cooldown: PT15M
    long-cooldown: PT4H
