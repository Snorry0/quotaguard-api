services:
  postgres:
    image: postgres:16-alpine
    container_name: quotaguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quotaguard
      POSTGRES_USER: quotaguard
      POSTGRES_PASSWORD: quotaguard
    ports:
      - "5432:5432"
    volumes:
      - quotaguard_postgres_data:/var/lib/postgresql/data

volumes:
  quotaguard_postgres_data: